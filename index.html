<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数据之美 | Beauty of Data</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <img class="hero__image" src="assets/hero-beauty-of-data.png" alt="数据之美 Beauty of Data 课程主图" />
      <div class="hero__shade"></div>
      <nav class="topbar" aria-label="课程导航">
        <a class="brand" href="#top" aria-label="数据之美首页">
          <span class="brand__mark"></span>
          <span>Beauty of Data</span>
        </a>
        <a class="topbar__link" href="#works">参考案例</a>
      </nav>
      <section class="hero__content" id="top">
        <p class="eyebrow">本科生通识课</p>
        <h1>数据之美</h1>
        <p class="subtitle">Beauty of Data</p>
        <p class="intro">
          用数据讲述真实世界的结构、节奏与想象力。这里整理课程中的经典可视化案例，供同学们在创作前观察、比较与借鉴。
        </p>
      </section>
    </header>

    <main>
      <section class="controls" id="works" aria-labelledby="works-title">
        <div>
          <p class="eyebrow">Gallery</p>
          <h2 id="works-title">参考案例</h2>
        </div>
        <div class="search">
          <label for="query">搜索案例</label>
          <input id="query" type="search" placeholder="输入标题、主题或标签" autocomplete="off" />
        </div>
      </section>

      <section class="filter-panel" aria-label="作品筛选">
        <div class="filter-group">
          <span class="filter-label">类型</span>
          <div class="tag-list" id="typeList"></div>
        </div>
        <div class="filter-group">
          <span class="filter-label">主题</span>
          <div class="tag-list" id="tagList"></div>
        </div>
        <p class="result-count" id="resultCount"></p>
      </section>

      <section class="gallery" id="gallery" aria-live="polite"></section>
      <p class="empty" id="emptyState" hidden>没有找到匹配的作品。</p>
    </main>

    <footer class="footer">
      <span>Beauty of Data</span>
      <span>Demo site powered by JSON data</span>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
